<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gravity Garden</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Gravity Garden</h1>
    <p class="subtitle">An interactive playground for Newtonian gravity and orbital mechanics.</p>
  </header>

  <main>
    <canvas id="stage" width="800" height="600" role="img"
      aria-label="Simulation of orbiting bodies under gravity"></canvas>

    <section class="controls" aria-label="Simulation controls">
      <div class="control-row">
        <label for="preset">Scenario</label>
        <select id="preset"></select>
      </div>

      <div class="control-row">
        <button id="toggle-play" type="button" aria-pressed="false">Pause</button>
        <button id="reset" type="button">Reset</button>
      </div>

      <div class="control-row">
        <label for="speed">Speed</label>
        <input id="speed" type="range" min="0.1" max="3" step="0.1" value="1" />
        <span id="speed-value">1.0&times;</span>
      </div>

      <div class="control-row">
        <label for="trails">
          <input id="trails" type="checkbox" checked />
          Show trails
        </label>
      </div>

      <p class="hint">Click anywhere on the canvas to drop a new body.</p>
      <p class="stats" id="stats" aria-live="polite"></p>
    </section>
  </main>

  <footer>
    <p>Physics: velocity-Verlet integration of pairwise Newtonian gravity, softened at short range.</p>
  </footer>

  <script type="module" src="src/main.js"></script>
</body>
</html>
